<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos — Casa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --border:#e5e4df;
  --border-soft:#eeede8;
  --text:#1a1a1a;
  --text-2:#555;
  --text-3:#999;
  --text-4:#ccc;
  --hogar:#2563eb;   --hogar-l:#eff6ff;  --hogar-d:#1e3a8a;
  --lake:#16a34a;    --lake-l:#f0fdf4;   --lake-d:#14532d;
  --event:#dc2626;   --event-l:#fef2f2;  --event-d:#7f1d1d;
  --red:#dc2626;     --red-l:#fef2f2;
}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* PAGES */
.page{display:none}.page.active{display:block}
.container{max-width:640px;margin:0 auto;padding:24px 18px 80px}

/* LOADING */
#loading-overlay{display:flex;position:fixed;inset:0;background:rgba(245,244,240,.95);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.loading-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--text)}
.loading-sub{font-size:13px;color:var(--text-3)}

/* TYPOGRAPHY */
.brand{font-family:'Fraunces',serif;font-size:28px;font-weight:300;letter-spacing:-.03em;line-height:1}
.brand-sub{font-size:11px;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;margin-top:4px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}

/* BUTTONS */
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;transition:all .15s}
.btn-primary{background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:9px 16px;border-radius:8px}
.btn-primary:hover{opacity:.82}.btn-primary:active{transform:scale(.97)}
.btn-ghost{background:transparent;color:var(--text-2);font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border-soft)}
.btn-danger{background:transparent;color:var(--red);font-size:13px;padding:8px 14px;border-radius:8px;border:1px solid #fca5a5}
.btn-danger:hover{background:var(--red-l)}
.header-btns{display:flex;gap:8px}

/* HOME SECTION CARDS */
.section-cards{display:flex;flex-direction:column;gap:12px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.section-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
.section-card-inner{padding:18px 20px}
.section-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-card-left{display:flex;align-items:center;gap:12px}
.section-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.section-name{font-family:'Fraunces',serif;font-size:18px;font-weight:400}
.section-total{font-family:'Fraunces',serif;font-size:24px;font-weight:300}
.section-month{font-size:11px;color:var(--text-3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.subsec-pills{display:flex;flex-wrap:wrap;gap:6px}
.subsec-pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px}
.section-card-bar{height:3px;width:100%}

/* MONTH SELECTOR */
.month-bar{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:20px}
.month-label{font-family:'Fraunces',serif;font-size:16px;font-weight:400}
.month-nav{display:flex;gap:4px}
.month-nav button{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-2);font-size:16px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{background:var(--border-soft)}

/* GRAND TOTAL */
.grand-total-bar{background:var(--text);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:baseline;justify-content:space-between}
.grand-total-lbl{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.06em}
.grand-total-val{font-family:'Fraunces',serif;font-size:32px;font-weight:300;color:#fff}

/* SECTION PAGE */
.sec-page-hero{margin-bottom:24px}
.sec-page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:300;letter-spacing:-.02em}
.sec-page-total{font-family:'Fraunces',serif;font-size:40px;font-weight:300;line-height:1;margin:8px 0 4px}
.sec-page-month{font-size:12px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}

/* SUBSECTION CARDS */
.subsec-cards{display:flex;flex-direction:column;gap:10px}
.subsec-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.subsec-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none}
.subsec-head-left{display:flex;align-items:center;gap:10px}
.subsec-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.subsec-title{font-size:14px;font-weight:500}
.subsec-right{display:flex;align-items:center;gap:10px}
.subsec-total{font-size:14px;font-weight:500}
.subsec-chevron{font-size:12px;color:var(--text-4);transition:transform .2s}
.subsec-chevron.open{transform:rotate(180deg)}
.subsec-body{padding:12px 16px;border-top:1px solid var(--border-soft);display:none}
.subsec-body.open{display:block}

/* INPUT ROW */
.input-row{display:flex;gap:8px;margin-bottom:8px}
.inp{height:36px;padding:0 12px;border:1px solid #e0dfd9;border-radius:8px;background:#fafaf8;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(26,26,26,.08)}
.inp-name{flex:1}.inp-price{width:110px;text-align:right}
.inp-hint{font-size:11px;color:var(--text-4);margin-bottom:10px}
.btn-add{width:36px;height:36px;border-radius:8px;color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-add:hover{opacity:.85}.btn-add:active{transform:scale(.95)}

/* ITEMS */
.items-list{border-top:1px solid var(--border-soft);padding-top:4px;margin-top:4px}
.item-row{display:flex;align-items:center;gap:10px;padding:7px 4px;border-radius:6px;transition:background .1s}
.item-row:hover{background:var(--bg)}
.item-idx{font-size:11px;color:var(--text-4);min-width:16px;text-align:right;flex-shrink:0}
.item-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-price{font-size:13px;font-weight:500;flex-shrink:0}
.btn-del{font-size:18px;color:var(--text-4);background:transparent;width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-del:hover{color:var(--red);background:var(--red-l)}
.empty-subsec{font-size:12px;color:var(--text-4);padding:4px 0 6px}

/* CHART */
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:20px;display:flex;flex-direction:column;align-items:center}
.chart-title{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;align-self:flex-start}
.chart-canvas-wrap{position:relative;width:180px;height:180px}
.chart-legend{display:flex;flex-direction:column;gap:7px;margin-top:16px;width:100%}
.legend-item{display:flex;align-items:center;justify-content:space-between;gap:10px}
.legend-left{display:flex;align-items:center;gap:8px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:13px;color:var(--text-2)}
.legend-pct{font-size:11px;color:var(--text-3)}
.legend-val{font-family:'Fraunces',serif;font-size:15px;font-weight:400}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.section-card,.subsec-card{animation:fadeIn .2s ease both}
.item-row{animation:fadeIn .12s ease both}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="loading-title">Casa</div>
  <div class="loading-sub">Cargando datos...</div>
</div>

<!-- ══ HOME ══════════════════════════════════════════ -->
<div id="page-home" class="page">
<div class="container">
  <header class="header">
    <div><div class="brand">Casa</div><div class="brand-sub">control de gastos</div></div>
  </header>

  <div class="month-bar">
    <div class="month-nav"><button onclick="changeMonth(-1)">‹</button></div>
    <div class="month-label" id="home-month-label">—</div>
    <div class="month-nav"><button onclick="changeMonth(1)">›</button></div>
  </div>

  <div class="grand-total-bar">
    <span class="grand-total-lbl">Total del mes</span>
    <span class="grand-total-val" id="grand-total">$0</span>
  </div>

  <div class="section-cards">

    <div class="section-card" onclick="openSection('hogar')">
      <div class="section-card-inner">
        <div class="section-card-top">
          <div class="section-card-left">
            <div class="section-badge" style="background:var(--hogar-l)">🏠</div>
            <div><div class="section-name">Hogar</div><div class="section-month" id="lbl-month-hogar"></div></div>
          </div>
          <div style="text-align:right">
            <div class="section-total" id="total-hogar">$0</div>
          </div>
        </div>
        <div class="subsec-pills" id="pills-hogar"></div>
      </div>
      <div class="section-card-bar" style="background:var(--hogar)"></div>
    </div>

    <div class="section-card" onclick="openSection('lake')">
      <div class="section-card-inner">
        <div class="section-card-top">
          <div class="section-card-left">
            <div class="section-badge" style="background:var(--lake-l)">🏡</div>
            <div><div class="section-name">Casa Lake</div><div class="section-month" id="lbl-month-lake"></div></div>
          </div>
          <div style="text-align:right">
            <div class="section-total" id="total-lake">$0</div>
          </div>
        </div>
        <div class="subsec-pills" id="pills-lake"></div>
      </div>
      <div class="section-card-bar" style="background:var(--lake)"></div>
    </div>

    <div class="section-card" onclick="openSection('event')">
      <div class="section-card-inner">
        <div class="section-card-top">
          <div class="section-card-left">
            <div class="section-badge" style="background:var(--event-l)">⚡</div>
            <div><div class="section-name">Gastos eventuales</div><div class="section-month" id="lbl-month-event"></div></div>
          </div>
          <div style="text-align:right">
            <div class="section-total" id="total-event">$0</div>
          </div>
        </div>
        <div class="subsec-pills" id="pills-event"></div>
      </div>
      <div class="section-card-bar" style="background:var(--event)"></div>
    </div>

  </div>
</div>
</div>

<!-- ══ SECTION PAGE ══════════════════════════════════ -->
<div id="page-section" class="page">
<div class="container">
  <header class="header">
    <button class="btn-ghost" onclick="goHome()">← Volver</button>
    <div id="sec-page-month-label" style="font-size:13px;color:var(--text-3)"></div>
  </header>

  <div class="sec-page-hero">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div id="sec-page-badge" class="section-badge" style="width:32px;height:32px;font-size:16px"></div>
      <div class="sec-page-title" id="sec-page-title"></div>
    </div>
    <div class="sec-page-total" id="sec-page-total">$0</div>
    <div class="sec-page-month">total del mes</div>
  </div>

  <div class="chart-wrap" id="chart-wrap" style="display:none">
    <div class="chart-title">Distribución por categoría</div>
    <div class="chart-canvas-wrap"><canvas id="pie-canvas"></canvas></div>
    <div class="chart-legend" id="chart-legend"></div>
  </div>

  <div class="subsec-cards" id="subsec-cards"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWRsiOmsM5ivzlT9g51ZDTBmdnbqeTBcc",
  authDomain: "lake-gastos.firebaseapp.com",
  projectId: "lake-gastos",
  storageBucket: "lake-gastos.firebasestorage.app",
  messagingSenderId: "688355914444",
  appId: "1:688355914444:web:69b11d47d95916db404869"
};

const app = initializeApp(firebaseConfig);
const firestore = getFirestore(app);

// ── CONFIG ─────────────────────────────────────────────────────
const SECTIONS = {
  hogar: {
    label: 'Hogar', icon: '🏠', color: '#2563eb', light: '#eff6ff', dark: '#1e3a8a',
    subsecs: [
      { id: 'comida',     label: 'Comida',      icon: '🛒' },
      { id: 'farmacia',   label: 'Farmacia',    icon: '💊' },
      { id: 'nafta',      label: 'Nafta',       icon: '⛽' },
      { id: 'impuestos',  label: 'Impuestos',   icon: '🏛' },
      { id: 'salidas',    label: 'Salidas',     icon: '🍽' },
      { id: 'boludeces',  label: 'Boludeces',   icon: '🛍' },
    ]
  },
  lake: {
    label: 'Casa Lake', icon: '🏡', color: '#16a34a', light: '#f0fdf4', dark: '#14532d',
    subsecs: [
      { id: 'impuestos',  label: 'Impuestos',   icon: '🏛' },
      { id: 'empleado',   label: 'Empleado',    icon: '👤' },
      { id: 'limpieza',   label: 'Limpieza',    icon: '🧹' },
      { id: 'lavadero',   label: 'Lavadero',    icon: '👕' },
      { id: 'insumos',    label: 'Insumos',     icon: '📦' },
      { id: 'reparaciones',label:'Reparaciones',icon: '🔧' },
      { id: 'mejoras',    label: 'Mejoras',     icon: '✨' },
    ]
  },
  event: {
    label: 'Gastos eventuales', icon: '⚡', color: '#dc2626', light: '#fef2f2', dark: '#7f1d1d',
    subsecs: [
      { id: 'general', label: 'General', icon: '⚡' },
    ]
  }
};

const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ── STATE ──────────────────────────────────────────────────────
const now = new Date();
let currentYear  = now.getFullYear();
let currentMonth = now.getMonth(); // 0-based
let activeSection = null;
let pieChart = null;

// db[year][month][section][subsection] = [ {id, name, price} ]
let db = {};

function monthKey() { return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }
function monthLabel() { return `${MONTHS[currentMonth]} ${currentYear}`; }

function getSubItems(secId, subId, year=currentYear, month=currentMonth) {
  const mk = `${year}-${String(month+1).padStart(2,'0')}`;
  return db?.[mk]?.[secId]?.[subId] || [];
}

function setSubItems(secId, subId, items) {
  const mk = monthKey();
  if (!db[mk]) db[mk] = {};
  if (!db[mk][secId]) db[mk][secId] = {};
  db[mk][secId][subId] = items;
}

function secTotal(secId) {
  const sec = SECTIONS[secId];
  return sec.subsecs.reduce((a, sub) => a + getSubItems(secId, sub.id).reduce((b, i) => b + i.price, 0), 0);
}

function subTotal(secId, subId) {
  return getSubItems(secId, subId).reduce((a, i) => a + i.price, 0);
}

const fmt = n => '$' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});

// ── FIRESTORE ──────────────────────────────────────────────────
function docRef() { return doc(firestore, 'gastos', 'data'); }

async function persist() {
  await setDoc(docRef(), db);
}

function listenDB() {
  onSnapshot(docRef(), snap => {
    if (snap.exists()) db = snap.data();
    else db = {};
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('page-home').classList.add('active');
    renderHome();
    if (activeSection) renderSectionPage(activeSection);
  });
}

// ── HOME ───────────────────────────────────────────────────────
window.changeMonth = function(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  renderHome();
};

function renderHome() {
  const lbl = monthLabel();
  document.getElementById('home-month-label').textContent = lbl;

  let grand = 0;
  Object.keys(SECTIONS).forEach(secId => {
    const sec = SECTIONS[secId];
    const tot = secTotal(secId);
    grand += tot;
    document.getElementById('total-'+secId).textContent = fmt(tot);
    document.getElementById('lbl-month-'+secId).textContent = lbl;

    // pills
    const pillsEl = document.getElementById('pills-'+secId);
    pillsEl.innerHTML = sec.subsecs.map(sub => {
      const st = subTotal(secId, sub.id);
      if (st === 0) return '';
      return `<span class="subsec-pill" style="background:${sec.light};color:${sec.dark}">${sub.icon} ${sub.label} · ${fmt(st)}</span>`;
    }).join('');
  });

  document.getElementById('grand-total').textContent = fmt(grand);
}

// ── SECTION PAGE ───────────────────────────────────────────────
window.openSection = function(secId) {
  activeSection = secId;
  showPage('section');
  renderSectionPage(secId);
};

window.goHome = function() {
  activeSection = null;
  showPage('home');
  renderHome();
};

function renderSectionPage(secId) {
  const sec = SECTIONS[secId];
  document.getElementById('sec-page-title').textContent = sec.label;
  document.getElementById('sec-page-badge').textContent = sec.icon;
  document.getElementById('sec-page-badge').style.background = sec.light;
  document.getElementById('sec-page-month-label').textContent = monthLabel();
  document.getElementById('sec-page-total').textContent = fmt(secTotal(secId));
  document.getElementById('sec-page-total').style.color = sec.color;
  renderChart(secId);
  renderSubsecs(secId);
}

function renderChart(secId) {
  const sec = SECTIONS[secId];
  const activeSubs = sec.subsecs.filter(s => subTotal(secId, s.id) > 0);
  const chartWrap = document.getElementById('chart-wrap');
  if (!activeSubs.length) { chartWrap.style.display = 'none'; return; }
  chartWrap.style.display = 'flex';

  const totals = activeSubs.map(s => subTotal(secId, s.id));
  const grand  = totals.reduce((a,v)=>a+v,0);

  // palette — shades of section color
  const alphas = [1,.75,.55,.4,.28,.18,.1];
  const colors = activeSubs.map((_,i) => hexAlpha(sec.color, alphas[i % alphas.length]));

  if (pieChart) { pieChart.destroy(); pieChart = null; }
  const ctx = document.getElementById('pie-canvas').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: activeSubs.map(s=>s.label),
      datasets: [{ data: totals, backgroundColor: colors, borderWidth: 3, borderColor: '#fff', hoverBorderColor: '#fff' }]
    },
    options: {
      cutout: '62%',
      animation: { duration: 500, easing: 'easeInOutQuart' },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${fmt(c.parsed)} (${((c.parsed/grand)*100).toFixed(1)}%)` }, bodyFont:{family:"'DM Sans',sans-serif",size:13}, padding:10, cornerRadius:8 }
      }
    }
  });

  document.getElementById('chart-legend').innerHTML = activeSubs.map((s,i) => `
    <div class="legend-item">
      <div class="legend-left">
        <span class="legend-dot" style="background:${colors[i]}"></span>
        <span class="legend-label">${s.icon} ${s.label}</span>
        <span class="legend-pct">${((totals[i]/grand)*100).toFixed(1)}%</span>
      </div>
      <span class="legend-val">${fmt(totals[i])}</span>
    </div>`).join('');
}

function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderSubsecs(secId) {
  const sec = SECTIONS[secId];
  const container = document.getElementById('subsec-cards');
  container.innerHTML = sec.subsecs.map((sub,idx) => {
    const tot = subTotal(secId, sub.id);
    const items = getSubItems(secId, sub.id);
    const itemsHtml = items.length ? items.map((item,i) => `
      <div class="item-row">
        <span class="item-idx">${i+1}</span>
        <span class="item-name">${esc(item.name)}</span>
        <span class="item-price">${fmt(item.price)}</span>
        <button class="btn-del" onclick="removeItem('${secId}','${sub.id}',${item.id})">×</button>
      </div>`).join('') : `<div class="empty-subsec">Sin gastos este mes.</div>`;

    return `
      <div class="subsec-card" id="subsec-${secId}-${sub.id}">
        <div class="subsec-head" onclick="toggleSubsec('${secId}','${sub.id}')">
          <div class="subsec-head-left">
            <div class="subsec-icon" style="background:${sec.light};color:${sec.color}">${sub.icon}</div>
            <span class="subsec-title">${sub.label}</span>
          </div>
          <div class="subsec-right">
            <span class="subsec-total" style="color:${sec.color};${tot===0?'opacity:.3':''}">${fmt(tot)}</span>
            <span class="subsec-chevron" id="chev-${secId}-${sub.id}">▾</span>
          </div>
        </div>
        <div class="subsec-body" id="body-${secId}-${sub.id}">
          <div class="input-row">
            <input class="inp inp-name" id="inp-n-${secId}-${sub.id}" placeholder="Descripción..." onkeydown="handleKey(event,'${secId}','${sub.id}')">
            <input class="inp inp-price" id="inp-p-${secId}-${sub.id}" type="number" min="0" step="any" placeholder="$ monto" onkeydown="handleKey(event,'${secId}','${sub.id}')">
            <button class="btn-add" style="background:${sec.color}" onclick="addItem('${secId}','${sub.id}')">+</button>
          </div>
          <div class="inp-hint">Enter para agregar</div>
          <div class="items-list" id="items-${secId}-${sub.id}">${itemsHtml}</div>
        </div>
      </div>`;
  }).join('');
}

// ── SUBSEC TOGGLE ──────────────────────────────────────────────
window.toggleSubsec = function(secId, subId) {
  const body = document.getElementById(`body-${secId}-${subId}`);
  const chev = document.getElementById(`chev-${secId}-${subId}`);
  const isOpen = body.classList.contains('open');
  // close all
  document.querySelectorAll('.subsec-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.subsec-chevron').forEach(c => c.classList.remove('open'));
  if (!isOpen) {
    body.classList.add('open');
    chev.classList.add('open');
    setTimeout(() => document.getElementById(`inp-n-${secId}-${subId}`)?.focus(), 50);
  }
};

// ── ADD / REMOVE ITEMS ─────────────────────────────────────────
window.handleKey = function(e, secId, subId) { if (e.key==='Enter') addItem(secId, subId); };

window.addItem = async function(secId, subId) {
  const nEl = document.getElementById(`inp-n-${secId}-${subId}`);
  const pEl = document.getElementById(`inp-p-${secId}-${subId}`);
  const name  = nEl.value.trim();
  const price = parseFloat(pEl.value);
  if (!name || isNaN(price) || price <= 0) { (name?pEl:nEl).focus(); return; }
  const items = [...getSubItems(secId, subId), { id: Date.now(), name, price }];
  setSubItems(secId, subId, items);
  nEl.value=''; pEl.value=''; nEl.focus();
  await persist();
};

window.removeItem = async function(secId, subId, id) {
  const items = getSubItems(secId, subId).filter(i => i.id !== id);
  setSubItems(secId, subId, items);
  await persist();
};

// ── NAV ────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  window.scrollTo(0,0);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ───────────────────────────────────────────────────────
listenDB();
</script>
</body>
</html>
